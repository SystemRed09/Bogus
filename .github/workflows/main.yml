on:
  push:
    branches: [Master]
  workflow_dispatch: 
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile yourscript.py
      - uses: actions/upload-artifact@v3
        with:
          name: windows-exe
          path: dist/
